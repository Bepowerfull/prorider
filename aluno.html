<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProRider — Portal do Aluno</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0f;--panel:#16161a;--card:#1e1e24;--border:rgba(255,255,255,.08);--accent:#ea860c;--accent2:#d62d2d;--blue:#295fe8;--green:#5db13d;--purple:#9b30ff;--text:#fff;--muted:rgba(255,255,255,.45)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 70% 60%,rgba(41,95,232,.08) 0%,transparent 60%)}
.login-box{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .bolt{font-size:42px;margin-bottom:8px}
.login-logo .brand{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:3px;background:linear-gradient(135deg,#ffe033,#ea860c,#d62d2d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo .sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.fg input{padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;font-size:14px;outline:none}
.fg input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:4px}
.login-err{color:#d62d2d;font-size:12px;text-align:center;margin-top:10px;display:none}

/* APP */
#app{display:none}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hbrand{display:flex;align-items:center;gap:10px}
.hbrand .name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;background:linear-gradient(135deg,#ffe033,#ea860c,#d62d2d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hav{display:flex;align-items:center;gap:8px}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.hname{font-size:13px;font-weight:600}
.btn-logout{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;margin-left:8px}
.btn-logout:hover{color:#fff}

/* BOTTOM NAV */
#bNav{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100}
.bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.5px;padding:6px 0}
.bnav-tab svg{opacity:.5;transition:.15s}
.bnav-tab.active{color:var(--accent)}
.bnav-tab.active svg{opacity:1;stroke:var(--accent)}

/* PAGES */
.pg{display:none;padding:16px 16px 80px}
.pg.active{display:block}

/* HOME / STATS */
.greeting{margin-bottom:20px}
.greeting .welcome{font-size:13px;color:var(--muted)}
.greeting .uname{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;line-height:1;margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.sbox .sv{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;line-height:1}
.sbox .sk{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:3px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.card-head{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}

/* HISTORY LIST */
.aula-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.aula-item:last-child{border-bottom:none}
.aula-item:hover{background:rgba(255,255,255,.02)}
.aula-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,rgba(41,95,232,.3),rgba(155,48,255,.3));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.aula-info{flex:1;min-width:0}
.aula-nome{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aula-data{font-size:11px;color:var(--muted)}
.aula-stats{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.aula-dur{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--accent)}
.aula-kcal{font-size:10px;color:var(--muted)}

/* ZONE DONUT */
.donut-wrap{display:flex;align-items:center;gap:16px;padding:16px}
.zone-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.zl-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.zl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.zl-name{font-size:12px;flex:1}
.zl-pct{font-size:12px;font-weight:700;color:var(--muted)}
.zl-bar{height:4px;border-radius:2px;flex:0 0 60px;background:rgba(255,255,255,.06);overflow:hidden}
.zl-bar-fill{height:100%;border-radius:2px}

/* MODAL AULA */
#modalOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
#modalOverlay.open{display:flex}
#modal{background:var(--panel);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:24px 20px 32px}
.modal-close{float:right;background:rgba(255,255,255,.06);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:18px;line-height:28px;text-align:center}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;margin-bottom:4px}
.modal-date{font-size:12px;color:var(--muted);margin-bottom:18px}
.m-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.m-stat{background:var(--card);border-radius:10px;padding:12px;text-align:center}
.m-sv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1}
.m-sk{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:3px}

/* PROFILE */
.pcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.pcard h3{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.prow:last-child{border-bottom:none}
.prow .k{color:var(--muted)} .prow .v{font-weight:600}

/* BRASÃO / BADGE */
.badge-hero{display:flex;flex-direction:column;align-items:center;padding:24px 0 16px;position:relative}
.badge-svg-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.badge-glow{position:absolute;width:120px;height:120px;border-radius:50%;filter:blur(30px);opacity:.35;pointer-events:none}
.badge-level-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:2px}
.badge-pts{font-size:13px;font-weight:700}
.badge-pts span{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
.progress-wrap{width:100%;margin-top:14px}
.progress-track{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}
.progress-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}

/* LEVELS ROAD */
.levels-road{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.level-step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;border:1px solid transparent}
.level-step.done{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)}
.level-step.current{border-color:rgba(234,134,12,.35);background:rgba(234,134,12,.06)}
.level-step.next{opacity:.45}
.level-step-icon{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.level-step-info{flex:1}
.level-step-name{font-size:13px;font-weight:700}
.level-step-pts{font-size:11px;color:var(--muted)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .eico{font-size:40px;margin-bottom:12px}
.empty p{font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="bolt">⚡</div>
      <div class="brand">PRORIDER</div>
      <div class="sub">Meu Portal</div>
    </div>
    <div class="fg"><label>E-mail</label><input type="email" id="lEmail" placeholder="aluno@email.com"></div>
    <div class="fg"><label>Senha</label><input type="password" id="lPass" placeholder="••••••••"></div>
    <button class="login-btn" onclick="doLogin()">ENTRAR</button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="hbrand"><div class="name">PRORIDER</div></div>
    <div class="hav">
      <div class="av" id="hAv">?</div>
      <span class="hname" id="hName"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <!-- HOME -->
  <div class="pg active" id="pgHome">
    <div class="greeting" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div class="welcome">Bem-vindo de volta,</div>
        <div class="uname" id="gName">—</div>
      </div>
      <div id="homeBadgeMini" style="cursor:pointer" onclick="showPg('Profile')"></div>
    </div>
    <div class="stats-row">
      <div class="sbox"><div class="sv" id="hsTotAulas" style="color:var(--accent)">—</div><div class="sk">Aulas</div></div>
      <div class="sbox"><div class="sv" id="hsTotKcal" style="color:var(--accent2)">—</div><div class="sk">Kcal total</div></div>
      <div class="sbox"><div class="sv" id="hsFtp" style="color:var(--blue)">—</div><div class="sk">FTP (W)</div></div>
    </div>
    <div class="card">
      <div class="card-head">🔥 Últimas aulas</div>
      <div id="recentList"></div>
    </div>
    <div class="card" id="zonaCard">
      <div class="card-head">📊 Zonas acumuladas (total)</div>
      <div class="donut-wrap">
        <svg id="homeDonut" width="110" height="110" viewBox="0 0 100 100" style="flex-shrink:0"></svg>
        <div class="zone-legend" id="homeLegend"></div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="pg" id="pgHistory">
    <div class="card-head" style="font-size:16px;font-weight:700;padding:0 0 14px">Histórico completo</div>
    <div id="histList"></div>
  </div>

  <!-- PROFILE -->
  <div class="pg" id="pgProfile">
    <!-- Brasão principal -->
    <div class="pcard" style="padding:0;overflow:hidden">
      <div id="profBadgeHero"></div>
    </div>
    <!-- Progressão de níveis -->
    <div class="pcard">
      <h3>Jornada de níveis</h3>
      <div class="levels-road" id="profLevelsRoad"></div>
    </div>
    <!-- Stats -->
    <div class="pcard">
      <h3>Desempenho</h3>
      <div id="profPerf"></div>
    </div>
    <!-- Info -->
    <div class="pcard">
      <h3>Minha conta</h3>
      <div id="profInfo"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bNav">
    <div class="bnav-tab active" id="nt-home" onclick="showPg('Home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Início
    </div>
    <div class="bnav-tab" id="nt-history" onclick="showPg('History')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Histórico
    </div>
    <div class="bnav-tab" id="nt-profile" onclick="showPg('Profile')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </div>
  </div>
</div>

<!-- MODAL AULA DETALHE -->
<div id="modalOverlay" onclick="closeModal(event)">
  <div id="modal">
    <button class="modal-close" onclick="closeModal(null,true)">✕</button>
    <div class="modal-title" id="mNome">—</div>
    <div class="modal-date" id="mData">—</div>
    <div class="m-stats">
      <div class="m-stat"><div class="m-sv" id="mDur" style="color:var(--accent)">—</div><div class="m-sk">Duração</div></div>
      <div class="m-stat"><div class="m-sv" id="mKcal" style="color:var(--accent2)">—</div><div class="m-sk">Kcal</div></div>
      <div class="m-stat"><div class="m-sv" id="mFtp" style="color:var(--blue)">—</div><div class="m-sk">FTP %</div></div>
    </div>
    <div class="m-stats" style="margin-bottom:18px">
      <div class="m-stat"><div class="m-sv" id="mWatts" style="color:var(--green)">—</div><div class="m-sk">Watts</div></div>
      <div class="m-stat"><div class="m-sv" id="mRpm" style="color:#d7c414">—</div><div class="m-sk">RPM méd.</div></div>
      <div class="m-stat"><div class="m-sv" id="mRpmMax" style="color:var(--purple)">—</div><div class="m-sk">RPM máx.</div></div>
    </div>
    <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px">Zonas</div>
    <div class="donut-wrap" style="padding:0;gap:14px">
      <svg id="mDonut" width="100" height="100" viewBox="0 0 100 100" style="flex-shrink:0"></svg>
      <div class="zone-legend" id="mLegend"></div>
    </div>
  </div>
</div>

<script>
const SERVER = 'https://prorider-server-production-5784.up.railway.app';
var token = localStorage.getItem('pr_aluno_token') || '';
var user  = JSON.parse(localStorage.getItem('pr_aluno_user') || 'null');
var histData = [];
var profileData = null;

const ZONES = [
  { name:'Z1 Recuperação', color:'#888888', key:'z1' },
  { name:'Z2 Resistência', color:'#295fe8',  key:'z2' },
  { name:'Z3 Tempo',       color:'#5db13d',  key:'z3' },
  { name:'Z4 Limiar',      color:'#d7c414',  key:'z4' },
  { name:'Z5 VO2max',      color:'#ea860c',  key:'z5' },
  { name:'Z6 Anaeróbio',   color:'#d62d2d',  key:'z6' },
  { name:'Z7 Neuromuscular',color:'#9b30ff', key:'z7' },
];

function init() {
  if (token && user) showApp();
}

async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const err   = document.getElementById('lErr');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent = 'Preencha e-mail e senha.'; err.style.display = 'block'; return; }
  try {
    const r = await fetch(SERVER + '/user/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Credenciais inválidas.'; err.style.display = 'block'; return; }
    token = d.token; user = d.user;
    localStorage.setItem('pr_aluno_token', token);
    localStorage.setItem('pr_aluno_user', JSON.stringify(user));
    showApp();
  } catch(e) { err.textContent = 'Erro de conexão.'; err.style.display = 'block'; }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  localStorage.removeItem('pr_aluno_token');
  localStorage.removeItem('pr_aluno_user');
  location.reload();
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const ini = (user.name||user.email||'?')[0].toUpperCase();
  document.getElementById('hAv').textContent = ini;
  document.getElementById('hName').textContent = user.name || user.email;
  document.getElementById('gName').textContent = (user.name||'').split(' ')[0] || 'Atleta';
  loadAll();
}

async function loadAll() {
  try {
    const [hist, prof] = await Promise.all([
      api('/aluno/portal/historico'),
      api('/aluno/portal/perfil')
    ]);
    histData = hist.historico || [];
    profileData = prof;
    renderHome();
    renderHistory();
    renderProfile();
  } catch(e) { console.error(e); }
}

async function api(path) {
  const r = await fetch(SERVER + path, { headers:{'Authorization':'Bearer '+token} });
  if (r.status === 401) { doLogout(); return {}; }
  return r.json();
}

// ── Pages ──
function showPg(name) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('pg'+name).classList.add('active');
  document.getElementById('nt-'+name.toLowerCase()).classList.add('active');
}

// ── Home ──
function renderHome() {
  const p   = profileData || {};
  const pts = parseInt(p.points) || 0;
  const cur = getCurrentLevel(pts);
  // Badge mini na home
  const mini = document.getElementById('homeBadgeMini');
  if (mini) {
    mini.innerHTML = getBadgeSVG(cur.key, 56) +
      `<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:${cur.cor};text-align:center;margin-top:2px;">${pts.toLocaleString('pt-BR')} pts</div>`;
  }
  document.getElementById('hsTotAulas').textContent = p.total_aulas || 0;
  document.getElementById('hsTotKcal').textContent  = p.total_kcal  ? Math.round(p.total_kcal) : 0;
  document.getElementById('hsFtp').textContent      = p.ftp || '—';
  // recent 5
  const recent = histData.slice(0, 5);
  const el = document.getElementById('recentList');
  if (!recent.length) {
    el.innerHTML = '<div class="empty"><div class="eico">🚴</div><p>Você ainda não tem aulas registradas.</p></div>';
  } else {
    el.innerHTML = recent.map(a => aulaItem(a)).join('');
  }
  // zonas acumuladas
  const acc = accZones(histData);
  drawDonut('homeDonut', acc, 110);
  drawLegend('homeLegend', acc);
}

function renderHistory() {
  const el = document.getElementById('histList');
  if (!histData.length) {
    el.innerHTML = '<div class="empty"><div class="eico">📋</div><p>Nenhuma aula ainda.</p></div>';
    return;
  }
  el.innerHTML = histData.map(a => `<div class="card" style="margin-bottom:10px">${aulaItem(a)}</div>`).join('');
}

// ── Sistema de níveis e brasões ──────────────────────────────
const LEVELS = [
  { key:'iniciante',     nome:'Iniciante',     pts:0,      cor:'#888888', cor2:'#555',    emoji:'🔘' },
  { key:'basico',        nome:'Básico',         pts:300,    cor:'#5db13d', cor2:'#3a7025', emoji:'🟢' },
  { key:'intermediario', nome:'Intermediário',  pts:800,    cor:'#295fe8', cor2:'#1a3d99', emoji:'🔵' },
  { key:'avancado',      nome:'Avançado',       pts:2000,   cor:'#d7c414', cor2:'#9e8e0d', emoji:'🟡' },
  { key:'elite',         nome:'Elite',          pts:5000,   cor:'#ea860c', cor2:'#b85e06', emoji:'🟠' },
  { key:'master',        nome:'Master',         pts:10000,  cor:'#d62d2d', cor2:'#8a1818', emoji:'🔴' },
  { key:'champion',      nome:'Champion',       pts:20000,  cor:'#9b30ff', cor2:'#5e1a99', emoji:'🟣' },
  { key:'legend',        nome:'Legend',         pts:40000,  cor:'#00d4ff', cor2:'#007a99', emoji:'💎' },
  { key:'godmode',       nome:'God Mode',       pts:80000,  cor:'#ffe033', cor2:'#c9a800', emoji:'⚡' },
];

function getBadgeSVG(level, size=100) {
  const lv = LEVELS.find(l => l.key === level.toLowerCase().replace(/\s/g,'').replace('é','e').replace('ó','o').replace('ê','e').replace('á','a')) || LEVELS[0];
  const c  = lv.cor;
  const c2 = lv.cor2;
  const s  = size;
  const cx = s/2, cy = s/2, r = s*0.42;
  // Hexágono
  const pts6 = Array.from({length:6},(_,i)=>{
    const a = Math.PI/180*(60*i-90);
    return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  }).join(' ');
  // Estrela interna de destaque
  const rIn = r*0.55;
  const star = Array.from({length:12},(_,i)=>{
    const rr = i%2===0 ? rIn : rIn*0.5;
    const a  = Math.PI/180*(30*i-90);
    return `${cx+rr*Math.cos(a)},${cy+rr*Math.sin(a)}`;
  }).join(' ');
  const ini = lv.nome[0];
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
    <defs>
      <linearGradient id="bg${lv.key}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${c}"/>
        <stop offset="100%" stop-color="${c2}"/>
      </linearGradient>
      <filter id="glow${lv.key}"><feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <polygon points="${pts6}" fill="url(#bg${lv.key})" opacity=".15" stroke="${c}" stroke-width="1.5"/>
    <polygon points="${pts6}" fill="none" stroke="${c}" stroke-width="2.5" filter="url(#glow${lv.key})"/>
    <polygon points="${star}" fill="${c}" opacity=".18"/>
    <text x="${cx}" y="${cy+s*.06}" text-anchor="middle" dominant-baseline="middle"
      font-family="'Bebas Neue',sans-serif" font-size="${s*.28}" fill="${c}"
      filter="url(#glow${lv.key})">${ini}</text>
    <text x="${cx}" y="${cy+r*.72}" text-anchor="middle"
      font-family="'Barlow Condensed',sans-serif" font-size="${s*.1}" font-weight="700"
      fill="${c}" opacity=".9" letter-spacing="1">${lv.nome.toUpperCase()}</text>
  </svg>`;
}

function getCurrentLevel(pts) {
  let cur = LEVELS[0];
  for (const l of LEVELS) { if (pts >= l.pts) cur = l; else break; }
  return cur;
}
function getNextLevel(pts) {
  return LEVELS.find(l => l.pts > pts) || null;
}

function renderProfile() {
  const p   = profileData || {};
  const pts = parseInt(p.points) || 0;
  const cur = getCurrentLevel(pts);
  const nxt = getNextLevel(pts);

  // ── Brasão Hero ──
  const ptsParaProx = nxt ? nxt.pts - pts : 0;
  const ptsNoNivel  = nxt ? pts - cur.pts : cur.pts;
  const rangNivel   = nxt ? nxt.pts - cur.pts : 1;
  const pct         = nxt ? Math.min(100, Math.round(ptsNoNivel / rangNivel * 100)) : 100;

  document.getElementById('profBadgeHero').innerHTML = `
    <div class="badge-hero" style="background:radial-gradient(ellipse at 50% 30%,${cur.cor}15 0%,transparent 70%)">
      <div class="badge-svg-wrap">
        <div class="badge-glow" style="background:${cur.cor}"></div>
        ${getBadgeSVG(cur.key, 110)}
      </div>
      <div class="badge-level-name" style="color:${cur.cor}">${cur.nome.toUpperCase()}</div>
      <div class="badge-pts" style="color:var(--muted)">
        <span style="color:${cur.cor}">${pts.toLocaleString('pt-BR')}</span> pontos
      </div>
      ${nxt ? `
      <div class="progress-wrap" style="padding:0 24px">
        <div class="progress-labels">
          <span>${cur.nome}</span>
          <span style="color:${nxt.cor}">${nxt.nome} em ${ptsParaProx.toLocaleString('pt-BR')} pts</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${cur.cor},${nxt.cor})"></div>
        </div>
        <div style="text-align:right;font-size:11px;color:var(--muted)">${pct}% concluído</div>
      </div>` : `
      <div style="margin-top:12px;font-size:12px;color:${cur.cor};font-weight:700;letter-spacing:1px">
        ⚡ NÍVEL MÁXIMO ATINGIDO
      </div>`}
    </div>`;

  // ── Jornada de níveis ──
  document.getElementById('profLevelsRoad').innerHTML = LEVELS.map(l => {
    const done    = pts >= l.pts;
    const current = l.key === cur.key;
    const cls     = current ? 'current' : done ? 'done' : 'next';
    return `<div class="level-step ${cls}">
      <div class="level-step-icon">${getBadgeSVG(l.key, 36)}</div>
      <div class="level-step-info">
        <div class="level-step-name" style="color:${done||current ? l.cor:'var(--muted)'}">${l.nome}</div>
        <div class="level-step-pts">${l.pts.toLocaleString('pt-BR')} pontos${current?' · atual':done?' · conquistado':''}</div>
      </div>
      ${current ? `<div style="font-size:18px">${l.emoji}</div>` : done ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${l.cor}" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
    </div>`;
  }).join('');

  // ── Desempenho ──
  document.getElementById('profPerf').innerHTML = [
    ['FTP',          (p.ftp||'—')+' W'],
    ['Peso',         (p.peso||'—')+' kg'],
    ['W/kg',         p.ftp&&p.peso ? (p.ftp/p.peso).toFixed(2)+' w/kg' : '—'],
    ['Total aulas',  p.total_aulas||0],
    ['Total kcal',   p.total_kcal ? Math.round(p.total_kcal).toLocaleString('pt-BR') : 0],
    ['Horas totais', p.total_seg ? fmtSeg(p.total_seg) : '—'],
  ].map(([k,v]) => `<div class="prow"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');

  // ── Conta ──
  document.getElementById('profInfo').innerHTML = [
    ['Nome',     p.name||'—'],
    ['E-mail',   p.email||'—'],
    ['Academia', p.license_id||'—'],
    ['Membro desde', p.created_at ? new Date(p.created_at).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}) : '—'],
  ].map(([k,v]) => `<div class="prow"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
}

// ── Helpers ──
function aulaItem(a) {
  return `<div class="aula-item" onclick="openModal(${a.id})">
    <div class="aula-icon">🚴</div>
    <div class="aula-info">
      <div class="aula-nome">${a.nome||'Aula'}</div>
      <div class="aula-data">${new Date(a.data_aula).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})}</div>
    </div>
    <div class="aula-stats">
      <div class="aula-dur">${fmtSeg(a.dur_seg)}</div>
      <div class="aula-kcal">${a.kcal||0} kcal</div>
    </div>
  </div>`;
}

function accZones(list) {
  const acc = {};
  ZONES.forEach(z => acc[z.key] = 0);
  list.forEach(a => {
    const zp = a.zona_pct || {};
    ZONES.forEach(z => { acc[z.key] += (zp[z.key]||0); });
  });
  // normalize
  const total = Object.values(acc).reduce((s,v) => s+v, 0);
  if (total > 0) ZONES.forEach(z => acc[z.key] = Math.round(acc[z.key]/total*100));
  return acc;
}

function drawDonut(id, acc, size) {
  const el = document.getElementById(id);
  if (!el) return;
  const cx=50, cy=50, r=36, stroke=14;
  const circ = 2*Math.PI*r;
  let offset = 0;
  const total = ZONES.reduce((s,z) => s+(acc[z.key]||0), 0) || 100;
  let paths = '';
  ZONES.forEach(z => {
    const pct = (acc[z.key]||0)/total;
    const dash = pct*circ;
    const gap  = circ - dash;
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${z.color}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}" stroke-dashoffset="${(-offset*circ/total).toFixed(2)}" transform="rotate(-90,${cx},${cy})"/>`;
    offset += acc[z.key]||0;
  });
  el.innerHTML = paths + `<text x="50" y="54" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">${total?'':'—'}</text>`;
}

function drawLegend(id, acc) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = ZONES.filter(z => (acc[z.key]||0) > 0).map(z => `
    <div class="zl-row">
      <div class="zl-dot" style="background:${z.color}"></div>
      <div class="zl-name" style="font-size:11px">${z.name}</div>
      <div class="zl-bar"><div class="zl-bar-fill" style="width:${acc[z.key]}%;background:${z.color}"></div></div>
      <div class="zl-pct">${acc[z.key]}%</div>
    </div>`).join('');
}

// ── Modal ──
function openModal(id) {
  const a = histData.find(x => x.id === id);
  if (!a) return;
  document.getElementById('mNome').textContent = a.nome || 'Aula';
  document.getElementById('mData').textContent = new Date(a.data_aula).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('mDur').textContent  = fmtSeg(a.dur_seg);
  document.getElementById('mKcal').textContent = a.kcal || 0;
  document.getElementById('mFtp').textContent  = (a.avg_ftp||0)+'%';
  document.getElementById('mWatts').textContent= a.avg_watts || '—';
  document.getElementById('mRpm').textContent  = a.avg_rpm || '—';
  document.getElementById('mRpmMax').textContent = a.max_rpm || '—';
  const acc = {};
  ZONES.forEach(z => acc[z.key] = Math.round((a.zona_pct||{})[z.key]||0));
  drawDonut('mDonut', acc, 100);
  drawLegend('mLegend', acc);
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e, force) {
  if (force || e?.target?.id === 'modalOverlay') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function fmtSeg(s) {
  if (!s) return '0m';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return h+'h '+m+'m';
  return m+'m'+(sec?'  '+sec+'s':'');
}

init();
</script>
